name: Daily arXiv Update

on:
  schedule:
    # 01:30 UTC every day (~09:30 Beijing)
    - cron: '30 1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest Gaussian Splatting papers
        run: python scripts/fetch_arxiv.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add README.md data/seen.json data/meta.json
            git commit -m "chore(auto): daily arxiv update $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No new papers today."
          fi
